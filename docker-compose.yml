services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cmms
      POSTGRES_PASSWORD: cmms
      POSTGRES_DB: cmms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  pgdata:
